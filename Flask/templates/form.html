<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Page</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .form-card {
      background-color: white;
      padding: 30px 40px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 320px;
      text-align: center;
      transition: transform 0.2s ease-in-out;
    }

    .form-card:hover {
      transform: scale(1.02);
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    label {
      display: block;
      text-align: left;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #66a6ff;
      outline: none;
    }

    button {
      background-color: #66a6ff;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #4b8df9;
    }

    p.error {
      color: red;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="form-card">
    <h2>Fill Your Details</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" >
      <label>Name:</label>
      <input type="text" name="name" id="name" placeholder="Enter your name" required>

      <label>Gender:</label>
      <input type="text" name="gender" placeholder="Enter your gender" required>

      <button type="submit">Submit</button>
    </form>
  </div>
</body>
</html>
